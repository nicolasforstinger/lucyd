name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt mypy pytest pytest-asyncio pytest-cov
      - name: mypy --strict
        run: mypy --strict *.py tools/*.py providers/*.py channels/*.py plugins.d/*.py
      - name: pytest
        run: pytest --tb=short -q
