name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: lucyd_test
          POSTGRES_USER: lucyd
          POSTGRES_PASSWORD: lucyd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://lucyd:lucyd@localhost:5432/lucyd_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt mypy pytest pytest-asyncio pytest-cov
      - name: mypy --strict
        run: mypy --strict *.py tools/*.py providers/*.py channels/*.py plugins.d/*.py
      - name: pytest
        run: pytest --tb=short -q
